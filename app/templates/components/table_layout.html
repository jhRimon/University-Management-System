<div class="card">

<div class="card-header">
<h3 class="card-title">{{ title }}</h3>
</div>

<div class="card-body">

{% if add_url %}
<a href="{{ add_url }}" class="btn btn-success mb-3">
Add {{ title }}
</a>
{% endif %}

<table class="table table-bordered table-striped">

<thead>
<tr>

{% for h in headers %}
<th>{{ h }}</th>
{% endfor %}

</tr>
</thead>

<tbody>

{% for row in rows %}
<tr>

{% for col in row %}
<td>{{ col }}</td>
{% endfor %}

</tr>
{% endfor %}

</tbody>

</table>

</div>

</div>
